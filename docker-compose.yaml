services:

  oracle-db:
    image: gvenzl/oracle-free:latest
    environment:
      ORACLE_PASSWORD: ahmed
    volumes:
      - oracle_data:/opt/oracle/oradata
    ports:
      - "1521:1521"
    networks:
      - default

  backend:
    image: eduko-app:latest
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@//oracle-db:1521/XEPDB1
      SPRING_DATASOURCE_USERNAME: hr
      SPRING_DATASOURCE_PASSWORD: ahmed
    depends_on:
      - oracle-db
    networks:
      - default

volumes:
  oracle_data:

networks:
  default: